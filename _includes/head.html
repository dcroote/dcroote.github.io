<head>
  <script>
    (function () {
      try {
        if (localStorage.getItem("theme") === "dark") {
          document.documentElement.classList.add("dark-mode");
        }
      } catch (e) {}
    })();
  </script>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width initial-scale=1" />

  <link
    rel="preload"
    href="{{ "/fonts/raleway-latin-400.woff2" | prepend: site.baseurl }}"
    as="font"
    type="font/woff2"
    crossorigin
  />
  <link rel="stylesheet" href="{{ "/css/Raleway.css" | prepend: site.baseurl }}">
  <link rel="stylesheet" href="{{ "/css/main.css" | prepend: site.baseurl }}">
  <link
    rel="alternate"
    type="application/atom+xml"
    title="{{ site.title }}"
    href="{{ "/feed.xml" | prepend: site.baseurl | prepend: site.url }}"
  />

  <link
    rel="shortcut icon"
    type="image/x-icon"
    href="{{ site.baseurl }}/images/favicon/favicon.ico"
  />
  <link
    rel="apple-touch-icon"
    sizes="180x180"
    href="{{ site.baseurl }}/images/favicon/apple-touch-icon.png"
  />
  <link
    rel="icon"
    type="image/png"
    sizes="32x32"
    href="{{ site.baseurl }}/images/favicon/favicon-32x32.png"
  />
  <link
    rel="icon"
    type="image/png"
    sizes="16x16"
    href="{{ site.baseurl }}/images/favicon/favicon-16x16.png"
  />

  {% if page.content contains "language-" %}
  <link href="{{ site.baseurl }}/css/prism.css" rel="stylesheet" />
  {% endif %}
  <script src="https://analytics.ahrefs.com/analytics.js" data-key="d1KzBf0paHx1wk+Q2tKKFw" async></script>
  {% if page.noindex %}
  <meta name="robots" content="noindex, follow" />
  {% endif %}
  {% seo %}
</head>
