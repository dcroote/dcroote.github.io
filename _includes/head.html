<head>
  <script>
    (function () {
      try {
        if (localStorage.getItem("theme") === "dark") {
          document.documentElement.classList.add("dark-mode");
        }
      } catch (e) {}
    })();
  </script>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width initial-scale=1" />

  <link rel="stylesheet" href="{{ " /css/Raleway.css" | prepend: site.baseurl
  }}"> <link rel="stylesheet" href="{{ " /css/main.css" | prepend: site.baseurl
  }}"> <link rel="alternate" type="application/atom+xml" title="{{ site.title
  }}" href="{{ "/feed.xml" | prepend: site.baseurl | prepend: site.url }}" />

  <link
    rel="shortcut icon"
    type="image/x-icon"
    href="{{ site.baseurl }}/images/favicon/favicon.ico"
  />
  <link
    rel="apple-touch-icon"
    sizes="180x180"
    href="{{ site.baseurl }}/images/favicon/apple-touch-icon.png"
  />
  <link
    rel="icon"
    type="image/png"
    sizes="32x32"
    href="{{ site.baseurl }}/images/favicon/favicon-32x32.png"
  />
  <link
    rel="icon"
    type="image/png"
    sizes="16x16"
    href="{{ site.baseurl }}/images/favicon/favicon-16x16.png"
  />

  <link href="{{ site.baseurl }}/css/prism.css" rel="stylesheet" />
  <script
    async
    src="https://www.googletagmanager.com/gtag/js?id=G-SDQ0R2YDX3"
  ></script>
  <script defer src="https://cloud.umami.is/script.js" data-website-id="43195762-7e8c-4808-b760-6664b260225e"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() {
      dataLayer.push(arguments);
    }
    gtag("js", new Date());
    gtag("config", "G-SDQ0R2YDX3");
  </script>

  {% seo %}
</head>
